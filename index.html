<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>天気APIサイト</title>


  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <link href="css/style.css" rel="stylesheet">
</head>

<body class="bg-light">

  <div class="container py-5">

    <h1 class="mb-4 text-primary">天気APIサイト</h1>



<div class="row g-3 align-items-end mb-4">

  <div class="col-12 col-md-10">
    <label for="citySelect" class="form-label">都市を選択してください</label>

    <select id="citySelect" class="form-select">
      <option value="nagoya">名古屋</option>
      <option value="tokyo">東京</option>
      <option value="osaka">大阪</option>
      <option value="sapporo">札幌</option>
      <option value="fukuoka">福岡</option>
    </select>
  </div>


  <div class="col-12 col-md-2">
    <button id="weatherBtn" class="btn btn-primary w-100">
      天気を取得する
    </button>
  </div>

</div>


    <div class="card">
      <div class="card-body">
        <h2 class="card-title">現在の天気</h2>
        <p id="message" class="card-text">
          まだ天気データは取得していません。
        </p>
      </div>
    </div>


    <footer class="mt-4">
      <small>
        Weather data by
        <a href="https://open-meteo.com/">Open-Meteo.com</a>
        （CC BY 4.0）
      </small>
    </footer>

  </div>


  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>


  <script type="module" src="js/main.js"></script>

</body>
</html>
